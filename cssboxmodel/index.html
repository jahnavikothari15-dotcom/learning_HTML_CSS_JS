<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            background-color: rgb(37, 118, 145);


        }
        .box1
        {
            width: 200px;
            height: 200px;
            margin: 20px;
            padding: 20px;
            border: 10px solid rgb(37, 118, 145);
            box-sizing: border-box;
        }
        .box2
        {
            width: 200px;
            height: 200px;
            margin: 20px;
            padding: 20px;
            border: 10px solid rgb(109, 5, 92);
            box-sizing: border-box;
        }

    </style>
</head>
<body>

        <div class="box box2">Iam another box</div>
