<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - lets learn it</title>
</head>

<body>
    <h1>Forms to upload for people who are intrested in GYM. </h1>
    <form action="post">
        <div>


            <label for="username">NAME:</label>
            <input type="text" name="username" placeholder="Enter your username" autofocus>
        </div>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <div>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
        </div>
        <div>
            <input type="checkbox" name="athlete" value="professional"> I'm a professional athlete<br>
        </div>
        <div>
            <textarea name="message" rows="5" cols="30" placeholder="Enter your message"></textarea>
        </div>
        <div>
            <select name="country">
                <option value="usa">USA</option>
                <option value="uk">UK</option>
                <option value="canada">Canada</option>
                <option value="australia">Australia</option>
            </select>
        </div>


    </form>
</body>

</html>
