<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizing Units</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .box {
            width: 50%;
            height: 200px;
            background-color: lightblue;
            border: 2px solid blue;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin:auto
        }
        .container {
            width: 50%;
            height: 200px;
            background-color: lightgray;
            border: 2px solid rgba(189, 12, 130, 0.034);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 23px auto
        }
        .myconnt {
            width: 100vmin;
            height: 200px;
            background-color: lightgreen;
            border: 2px solid rgba(189, 12, 130, 0.034);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 23px auto
        }
    </style>


</head>
<body>
    <div class ="box">
        This is a box.

    </div>
    <div class ="container">
        This is a container.
    </div>
    <div class = "myconnt" >
        I m a container with a class name mycon.
    </div>
    
</body>
</html>
