<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specificity</title>
    <style>
        h1{
            
            color: red;
        }
        .yellow{
            color: yellow;
        }
        .cred{
            color: crimson;
        }
        .cpurple{
            color: purple;
        }
    </style>



    

    
</head>
<body>
    <div>
        <h1  style="color:blue !important" class ="yellow cred cpurple">
            CSS Specificity is a set of rules that browsers use to determine which styles are applied to an element. It is calculated based on the types of selectors used in the CSS. 
        </h1>
    </div>
</body>
</html>
