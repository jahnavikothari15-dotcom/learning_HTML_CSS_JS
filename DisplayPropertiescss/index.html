<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <style>
        *{
            margin: 0;
            border: 0;
        }
        .box {
            border: 2px solid palevioletred;
            display: inline-block;
            padding:45px;
            margin:34px;
            display: inline-flex;
            justify-content: center;
        
        }
    </style>
</head>

<body>
    <div class="box">
        I am a box
    </div>
    <div class ="box">
        also a  nice  box
    </div>
    <span> I am a very good</span>
    <span>girl</span>
</body>

</html>
