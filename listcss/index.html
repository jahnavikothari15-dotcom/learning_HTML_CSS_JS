<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListCSS</title>
    <style>
        nav ul li{
            list-style: devanagari;
            background-color: rgb(77, 77, 218);
            list-style-position: inside;
            border: 2px solid black;
            list-style:disc inside url("https://gifdb.com/images/high/gym-498-x-364-gif-djek8e2f3yn0i6hh.gif");
        }
    </style>

</head>
<body>
    <nav>
        <ul>
            <li>HOME</li>
            <li>ABOUT</li>
            <li>CONTACT</li>

        </ul>
    </nav>
    
</body>
</html>
